naftiko: 1.0.0-alpha2
info:
  label: RUCKUS One API — AccessPoints
  description: 'RUCKUS One API — AccessPoints. 1 operations. Lead operation: List access points. Self-contained Naftiko capability
    covering one Commscope Holding business surface.'
  tags:
  - Commscope Holding
  - AccessPoints
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMSCOPE_HOLDING_API_KEY: COMMSCOPE_HOLDING_API_KEY
capability:
  consumes:
  - type: http
    namespace: ruckus-one-accesspoints
    baseUri: https://api.ruckus.cloud
    description: RUCKUS One API — AccessPoints business capability. Self-contained, no shared references.
    resources:
    - name: api-tenant-tenantId-aps
      path: /api/tenant/{tenantId}/aps
      operations:
      - name: listaccesspoints
        method: GET
        description: List access points
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.COMMSCOPE_HOLDING_API_KEY}}'
  exposes:
  - type: rest
    namespace: ruckus-one-accesspoints-rest
    port: 8080
    description: REST adapter for RUCKUS One API — AccessPoints. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/tenant/{tenantid}/aps
      name: api-tenant-tenantid-aps
      description: REST surface for api-tenant-tenantId-aps.
      operations:
      - method: GET
        name: listaccesspoints
        description: List access points
        call: ruckus-one-accesspoints.listaccesspoints
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ruckus-one-accesspoints-mcp
    port: 9090
    transport: http
    description: MCP adapter for RUCKUS One API — AccessPoints. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-access-points
      description: List access points
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ruckus-one-accesspoints.listaccesspoints
      outputParameters:
      - type: object
        mapping: $.
