naftiko: 1.0.0-alpha2
info:
  label: RUCKUS One API — Authentication
  description: 'RUCKUS One API — Authentication. 1 operations. Lead operation: Exchange client credentials for an access token.
    Self-contained Naftiko capability covering one Commscope Holding business surface.'
  tags:
  - Commscope Holding
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMSCOPE_HOLDING_API_KEY: COMMSCOPE_HOLDING_API_KEY
capability:
  consumes:
  - type: http
    namespace: ruckus-one-authentication
    baseUri: https://api.ruckus.cloud
    description: RUCKUS One API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth2-token
      path: /oauth2/token
      operations:
      - name: getaccesstoken
        method: POST
        description: Exchange client credentials for an access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COMMSCOPE_HOLDING_API_KEY}}'
  exposes:
  - type: rest
    namespace: ruckus-one-authentication-rest
    port: 8080
    description: REST adapter for RUCKUS One API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth2/token
      name: oauth2-token
      description: REST surface for oauth2-token.
      operations:
      - method: POST
        name: getaccesstoken
        description: Exchange client credentials for an access token
        call: ruckus-one-authentication.getaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ruckus-one-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for RUCKUS One API — Authentication. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: exchange-client-credentials-access-token
      description: Exchange client credentials for an access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ruckus-one-authentication.getaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
