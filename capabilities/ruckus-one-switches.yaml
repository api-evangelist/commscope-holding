naftiko: 1.0.0-alpha2
info:
  label: RUCKUS One API — Switches
  description: 'RUCKUS One API — Switches. 1 operations. Lead operation: List ICX switches. Self-contained Naftiko capability
    covering one Commscope Holding business surface.'
  tags:
  - Commscope Holding
  - Switches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMSCOPE_HOLDING_API_KEY: COMMSCOPE_HOLDING_API_KEY
capability:
  consumes:
  - type: http
    namespace: ruckus-one-switches
    baseUri: https://api.ruckus.cloud
    description: RUCKUS One API — Switches business capability. Self-contained, no shared references.
    resources:
    - name: api-tenant-tenantId-switches
      path: /api/tenant/{tenantId}/switches
      operations:
      - name: listswitches
        method: GET
        description: List ICX switches
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.COMMSCOPE_HOLDING_API_KEY}}'
  exposes:
  - type: rest
    namespace: ruckus-one-switches-rest
    port: 8080
    description: REST adapter for RUCKUS One API — Switches. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/tenant/{tenantid}/switches
      name: api-tenant-tenantid-switches
      description: REST surface for api-tenant-tenantId-switches.
      operations:
      - method: GET
        name: listswitches
        description: List ICX switches
        call: ruckus-one-switches.listswitches
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ruckus-one-switches-mcp
    port: 9090
    transport: http
    description: MCP adapter for RUCKUS One API — Switches. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-icx-switches
      description: List ICX switches
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ruckus-one-switches.listswitches
      outputParameters:
      - type: object
        mapping: $.
