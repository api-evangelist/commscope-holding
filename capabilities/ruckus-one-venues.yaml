naftiko: 1.0.0-alpha2
info:
  label: RUCKUS One API — Venues
  description: 'RUCKUS One API — Venues. 2 operations. Lead operation: List venues. Self-contained Naftiko capability covering
    one Commscope Holding business surface.'
  tags:
  - Commscope Holding
  - Venues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMSCOPE_HOLDING_API_KEY: COMMSCOPE_HOLDING_API_KEY
capability:
  consumes:
  - type: http
    namespace: ruckus-one-venues
    baseUri: https://api.ruckus.cloud
    description: RUCKUS One API — Venues business capability. Self-contained, no shared references.
    resources:
    - name: api-tenant-tenantId-venues
      path: /api/tenant/{tenantId}/venues
      operations:
      - name: listvenues
        method: GET
        description: List venues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createvenue
        method: POST
        description: Create a venue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COMMSCOPE_HOLDING_API_KEY}}'
  exposes:
  - type: rest
    namespace: ruckus-one-venues-rest
    port: 8080
    description: REST adapter for RUCKUS One API — Venues. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/tenant/{tenantid}/venues
      name: api-tenant-tenantid-venues
      description: REST surface for api-tenant-tenantId-venues.
      operations:
      - method: GET
        name: listvenues
        description: List venues
        call: ruckus-one-venues.listvenues
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createvenue
        description: Create a venue
        call: ruckus-one-venues.createvenue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ruckus-one-venues-mcp
    port: 9090
    transport: http
    description: MCP adapter for RUCKUS One API — Venues. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-venues
      description: List venues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ruckus-one-venues.listvenues
      outputParameters:
      - type: object
        mapping: $.
    - name: create-venue
      description: Create a venue
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ruckus-one-venues.createvenue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
