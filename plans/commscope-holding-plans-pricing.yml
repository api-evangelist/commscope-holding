provider: CommScope Holding
providerId: commscope-holding
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Networking
  - Hardware
  - Telecommunications
description: CommScope is a networking-infrastructure manufacturer (RUCKUS, ARRIS) selling hardware, antennas,
  cabling, and DAS solutions. There is no public API price list; products are sold via channel and partner
  programs. Some product-line cloud services (e.g. RUCKUS Cloud) have their own subscription pricing
  tied to access-point counts.
sources:
  - https://www.commscope.com/
notes: No consolidated public API/developer pricing; product subscriptions priced per-AP/per-device through
  partners.
plans:
  - id: commscope-holding-channel
    name: Channel / Partner
    type: enterprise
    description: CommScope hardware and product-line cloud services are sold through resellers and partners;
      pricing is per-quote.
    entries:
      - label: Custom partner quote
        name: channel_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact partner
        userMultiplied: false
    elements:
      - name: RUCKUS networking
      - name: ARRIS broadband
      - name: Outdoor wireless / DAS
      - name: Connectivity infrastructure
