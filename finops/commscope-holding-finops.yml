specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: CommScope Holding
providerId: commscope-holding
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Networking
  - Hardware
description: 'FOCUS-aligned FinOps for CommScope Holding: hardware (CapEx) plus product-line subscriptions
  (RUCKUS Cloud) sold through channel partners. No public consumption-metered API surface at the holding
  level.'
sources:
  - https://www.commscope.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: CommScope, Inc.
serviceCategory: Networking
billingModel:
  pricingCategory: Hardware + Subscription
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: CommScope
  ServiceCategory: Networking
  ProviderName: CommScope
  PublisherName: CommScope, Inc.
  InvoiceIssuerName: CommScope, Inc.
  BillingCurrency: USD
meters:
  - name: hardware_units
    unit: unit
    aggregation: sum
    dimensions:
      - product_family
      - sku
  - name: ruckus_cloud_subscription
    unit: ap-month
    aggregation: sum
    dimensions:
      - tier
  - name: support_subscription
    unit: month
    aggregation: sum
    dimensions:
      - device
      - tier
principles:
  - name: Visibility
    description: Reconcile partner invoices to product SKUs and AP/device serial numbers; pull subscription
      data from RUCKUS Cloud / RUCKUS One dashboards.
  - name: Allocation
    description: Tag hardware to site and product-line subscriptions to tenant/site.
  - name: Optimization
    description: Consolidate AP licenses where deployments shrink; align hardware refresh cycles with
      depreciation schedule.
  - name: Accountability
    description: Network engineering owns AP fleet; finance owns CapEx vs subscription mix.
notes: No public corporate API consumption pricing.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
